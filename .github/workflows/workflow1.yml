name: Python - tests

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '.github/workflows/*'
  pull_request:
    types:
      - opened
  workflow_dispatch:

jobs:

  changes:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.filter.outputs.run_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if code changed
        id: filter
        run: |
          if git diff --name-only HEAD~1 | grep -E '\.py$'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi
  test:
    needs: changes
    if: ${{ needs.changes.outputs.run_tests == 'true' }}  
    strategy:
      matrix:
        python: ["3.10", "3.11"]

    uses: ./.github/workflows/reusable.yml
    with:
      python_version: ${{ matrix.python }}
    runs-on: ubuntu-latest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Upload artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-artifact
          path: path/to/artifact
      - name: Publish filename
        id: publish
        run: |
          FILE=$(find path -type f | head -n 1)
          echo "script-file=$FILE" >> $GITHUB_OUTPUT  print:

  print:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Print filename
        run: echo "${{ needs.deploy.outputs.script-file  }}"